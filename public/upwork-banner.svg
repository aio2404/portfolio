<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="500" viewBox="0 0 1400 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a1e"/>
      <stop offset="50%" style="stop-color:#2d1133"/>
      <stop offset="100%" style="stop-color:#1a0a1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="40" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="500" fill="url(#bg)"/>

  <!-- Ambient glow circles -->
  <circle cx="200" cy="250" r="200" fill="#7c3aed" opacity="0.08"/>
  <circle cx="1200" cy="150" r="180" fill="#a855f7" opacity="0.07"/>
  <circle cx="700" cy="500" r="250" fill="#6d28d9" opacity="0.06"/>

  <!-- Decorative grid lines -->
  <g opacity="0.06" stroke="#a855f7" stroke-width="1">
    <line x1="0" y1="100" x2="1400" y2="100"/>
    <line x1="0" y1="200" x2="1400" y2="200"/>
    <line x1="0" y1="300" x2="1400" y2="300"/>
    <line x1="0" y1="400" x2="1400" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
    <line x1="1200" y1="0" x2="1200" y2="500"/>
  </g>

  <!-- Left accent bar -->
  <rect x="80" y="140" width="4" height="220" rx="2" fill="url(#accent)" filter="url(#glow)"/>

  <!-- Name -->
  <text x="112" y="210" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-2">Alexia</text>
  <text x="112" y="285" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="700" fill="url(#accent)" letter-spacing="-2" filter="url(#glow)">Berger</text>

  <!-- Divider line -->
  <rect x="112" y="305" width="340" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>

  <!-- Tagline -->
  <text x="112" y="340" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="400" fill="#c4b5d4" letter-spacing="1">DevOps &amp; AI Automation Engineer</text>

  <!-- Location badge -->
  <rect x="112" y="360" width="180" height="36" rx="18" fill="url(#pill)" stroke="#a855f7" stroke-width="1" stroke-opacity="0.4"/>
  <text x="202" y="383" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#c4b5d4" text-anchor="middle"> Based in France</text>

  <!-- Right side — skill pills -->
  <!-- Row 1 -->
  <rect x="820" y="120" width="160" height="44" rx="22" fill="url(#pill)" stroke="#a855f7" stroke-width="1" stroke-opacity="0.5"/>
  <text x="900" y="147" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#e9d5ff" text-anchor="middle">n8n · Make</text>

  <rect x="1000" y="120" width="180" height="44" rx="22" fill="url(#pill)" stroke="#a855f7" stroke-width="1" stroke-opacity="0.5"/>
  <text x="1090" y="147" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#e9d5ff" text-anchor="middle">AI Agents</text>

  <rect x="1200" y="120" width="140" height="44" rx="22" fill="url(#pill)" stroke="#a855f7" stroke-width="1" stroke-opacity="0.5"/>
  <text x="1270" y="147" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#e9d5ff" text-anchor="middle">Docker</text>

  <!-- Row 2 -->
  <rect x="820" y="184" width="160" height="44" rx="22" fill="url(#pill)" stroke="#a855f7" stroke-width="1" stroke-opacity="0.5"/>
  <text x="900" y="211" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#e9d5ff" text-anchor="middle">AWS · GCP</text>

  <rect x="1000" y="184" width="180" height="44" rx="22" fill="url(#pill)" stroke="#a855f7" stroke-width="1" stroke-opacity="0.5"/>
  <text x="1090" y="211" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#e9d5ff" text-anchor="middle">CI/CD · DevOps</text>

  <rect x="1200" y="184" width="140" height="44" rx="22" fill="url(#pill)" stroke="#a855f7" stroke-width="1" stroke-opacity="0.5"/>
  <text x="1270" y="211" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#e9d5ff" text-anchor="middle">Python</text>

  <!-- Row 3 -->
  <rect x="820" y="248" width="160" height="44" rx="22" fill="url(#pill)" stroke="#a855f7" stroke-width="1" stroke-opacity="0.5"/>
  <text x="900" y="275" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#e9d5ff" text-anchor="middle">Next.js</text>

  <rect x="1000" y="248" width="180" height="44" rx="22" fill="url(#pill)" stroke="#a855f7" stroke-width="1" stroke-opacity="0.5"/>
  <text x="1090" y="275" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#e9d5ff" text-anchor="middle">Kubernetes</text>

  <rect x="1200" y="248" width="140" height="44" rx="22" fill="url(#pill)" stroke="#a855f7" stroke-width="1" stroke-opacity="0.5"/>
  <text x="1270" y="275" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#e9d5ff" text-anchor="middle">Terraform</text>

  <!-- Stats bar -->
  <rect x="820" y="330" width="520" height="100" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#a855f7" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Stat 1 -->
  <text x="930" y="375" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700" fill="#a855f7" text-anchor="middle" filter="url(#glow)">5+</text>
  <text x="930" y="400" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#c4b5d4" text-anchor="middle">Years experience</text>

  <rect x="1025" y="345" width="1" height="70" fill="#a855f7" opacity="0.3"/>

  <!-- Stat 2 -->
  <text x="1080" y="375" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700" fill="#a855f7" text-anchor="middle" filter="url(#glow)">20+</text>
  <text x="1080" y="400" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#c4b5d4" text-anchor="middle">Projects delivered</text>

  <rect x="1175" y="345" width="1" height="70" fill="#a855f7" opacity="0.3"/>

  <!-- Stat 3 -->
  <text x="1240" y="375" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700" fill="#a855f7" text-anchor="middle" filter="url(#glow)">EN·FR</text>
  <text x="1240" y="400" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#c4b5d4" text-anchor="middle">Bilingual</text>

  <!-- Bottom tagline -->
  <text x="700" y="470" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#6b4f78" text-anchor="middle" letter-spacing="3">AUTOMATION · CLOUD · AI · WEB DEVELOPMENT</text>

</svg>
